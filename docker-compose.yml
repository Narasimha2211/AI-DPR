version: "3.9"

services:
  ai-dpr:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai-dpr-system
    ports:
      - "8000:8000"
    environment:
      - APP_ENV=production
      - DATABASE_URL=sqlite+aiosqlite:///./data/ai_dpr.db
      - MAX_FILE_SIZE_MB=50
      - LOG_LEVEL=info
    volumes:
      - ./uploads:/app/uploads
      - ./data:/app/data
      - ./ml/trained_models:/app/ml/trained_models
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
